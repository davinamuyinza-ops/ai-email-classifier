<!DOCTYPE html>
<html>
<head>
  <title>AI Email Classifier</title>
</head>
<body>

<h2>Email Classifier</h2>

<label>Subject:</label><br>
<input id="subject" style="width:300px"><br><br>

<label>Body:</label><br>
<textarea id="body" rows="6" cols="50"></textarea><br><br>

<button onclick="analyze()">Analyze</button>

<h3>Result:</h3>
<pre id="result"></pre>

<script>
async function analyze() {
  const subject = document.getElementById("subject").value;
  const body = document.getElementById("body").value;

  const response = await fetch("https://ai-email-classifier-y60f.onrender.com/classify-email", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ subject, body })
  });

  const data = await response.json();
  document.getElementById("result").textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
